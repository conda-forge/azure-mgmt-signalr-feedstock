schema_version: 1

context:
  name: azure-mgmt-signalr
  version: 2.0.0b2

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/azure-mgmt-signalr-${{ version }}.tar.gz
  sha256: d393d457ca2e00aabfc611b1544588cc3a29d1aed60d35799865520b8b2ff4fe

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - setuptools
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - azure-common >=1.1,<2.dev0
    - azure-mgmt-core >=1.3.2,<2.0.0
    - typing_extensions >=4.3.0
    - isodate >=0.6.1,<1.0.0

tests:
  - python:
      imports:
        - azure.mgmt.signalr
        - azure.mgmt.signalr.aio
      pip_check: true
      python_version: ${{ python_min }}.*
about:
  summary: Microsoft Azure SignalR Client Library for Python
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/Azure/azure-sdk-for-python

extra:
  recipe-maintainers:
    - janjagusch
